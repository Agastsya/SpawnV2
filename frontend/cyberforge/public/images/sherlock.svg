<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#D25353" stroke-width="2"/>

  <!-- Magnifying glass circle -->
  <circle cx="185" cy="170" r="85" fill="none" stroke="#D25353" stroke-width="3.5"/>
  <circle cx="185" cy="170" r="70" fill="none" stroke="#FFEAD3" stroke-width="1" opacity="0.2"/>

  <!-- Crosshair inside glass -->
  <line x1="185" y1="105" x2="185" y2="235" stroke="#D25353" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="170" x2="250" y2="170" stroke="#D25353" stroke-width="1.5" opacity="0.6"/>
  <circle cx="185" cy="170" r="20" fill="none" stroke="#D25353" stroke-width="1.5" opacity="0.6"/>

  <!-- Target dot -->
  <circle cx="185" cy="170" r="5" fill="#D25353"/>

  <!-- Handle -->
  <line x1="248" y1="233" x2="310" y2="295" stroke="#FFEAD3" stroke-width="12" stroke-linecap="round"/>
  <line x1="248" y1="233" x2="310" y2="295" stroke="#D25353" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Social icons suggestion (dots around lens) -->
  <circle cx="120" cy="105" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="185" cy="88"  r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="250" cy="105" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="268" cy="170" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="250" cy="235" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="185" cy="252" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="120" cy="235" r="5" fill="#D25353" opacity="0.7"/>
  <circle cx="102" cy="170" r="5" fill="#D25353" opacity="0.7"/>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">Sherlock</text>
  <text x="200" y="355" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13" letter-spacing="2">OSINT TRACKER</text>
</svg>
