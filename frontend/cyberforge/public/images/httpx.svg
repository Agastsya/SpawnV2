<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#D25353" stroke-width="2"/>

  <!-- Globe circle -->
  <circle cx="200" cy="185" r="100" fill="none" stroke="#D25353" stroke-width="2.5"/>

  <!-- Latitude lines -->
  <ellipse cx="200" cy="185" rx="100" ry="35" fill="none" stroke="#D25353" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="185" x2="300" y2="185" stroke="#D25353" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="185" rx="100" ry="70" fill="none" stroke="#D25353" stroke-width="1" opacity="0.3"/>

  <!-- Vertical line (meridian) -->
  <ellipse cx="200" cy="185" rx="40" ry="100" fill="none" stroke="#D25353" stroke-width="1" opacity="0.5"/>

  <!-- HTTP label -->
  <text x="200" y="178" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="22" font-weight="bold">HTTP</text>
  <text x="200" y="200" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13">200 301 403 500</text>

  <!-- Speed lines -->
  <line x1="40" y1="140" x2="95" y2="155" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="185" x2="95" y2="185" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="230" x2="95" y2="215" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>
  <line x1="305" y1="155" x2="360" y2="140" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>
  <line x1="305" y1="185" x2="360" y2="185" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>
  <line x1="305" y1="215" x2="360" y2="230" stroke="#D25353" stroke-width="1.5" opacity="0.7"/>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">HTTPx</text>
  <text x="200" y="355" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13" letter-spacing="2">HTTP PROBER</text>
</svg>
