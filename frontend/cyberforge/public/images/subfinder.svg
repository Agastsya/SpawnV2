<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#D25353" stroke-width="2"/>

  <!-- Root domain node -->
  <rect x="150" y="80" width="100" height="36" rx="4" fill="#D25353" opacity="0.9"/>
  <text x="200" y="103" text-anchor="middle" fill="#0a0a0a" font-family="monospace" font-size="13" font-weight="bold">example.com</text>

  <!-- Branch lines -->
  <line x1="200" y1="116" x2="200" y2="148" stroke="#FFEAD3" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="148" x2="80"  y2="175" stroke="#FFEAD3" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="148" x2="200" y2="175" stroke="#FFEAD3" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="148" x2="320" y2="175" stroke="#FFEAD3" stroke-width="1.5" opacity="0.6"/>

  <!-- Level 1 subdomain nodes -->
  <rect x="30"  y="175" width="100" height="30" rx="4" fill="none" stroke="#D25353" stroke-width="1.5"/>
  <text x="80"  y="195" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="11">api.</text>

  <rect x="150" y="175" width="100" height="30" rx="4" fill="none" stroke="#D25353" stroke-width="1.5"/>
  <text x="200" y="195" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="11">mail.</text>

  <rect x="270" y="175" width="100" height="30" rx="4" fill="none" stroke="#D25353" stroke-width="1.5"/>
  <text x="320" y="195" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="11">dev.</text>

  <!-- Level 2 branches -->
  <line x1="80"  y1="205" x2="55"  y2="232" stroke="#FFEAD3" stroke-width="1" opacity="0.4"/>
  <line x1="80"  y1="205" x2="105" y2="232" stroke="#FFEAD3" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="205" x2="295" y2="232" stroke="#FFEAD3" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="205" x2="345" y2="232" stroke="#FFEAD3" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="205" x2="200" y2="232" stroke="#FFEAD3" stroke-width="1" opacity="0.4"/>

  <!-- Level 2 nodes -->
  <rect x="20"  y="232" width="70" height="26" rx="4" fill="none" stroke="#D25353" stroke-width="1" opacity="0.7"/>
  <text x="55"  y="249" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="10" opacity="0.8">v2.api.</text>

  <rect x="70"  y="232" width="70" height="26" rx="4" fill="none" stroke="#D25353" stroke-width="1" opacity="0.7"/>
  <text x="105" y="249" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="10" opacity="0.8">v3.api.</text>

  <rect x="165" y="232" width="70" height="26" rx="4" fill="none" stroke="#D25353" stroke-width="1" opacity="0.7"/>
  <text x="200" y="249" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="10" opacity="0.8">smtp.</text>

  <rect x="260" y="232" width="70" height="26" rx="4" fill="none" stroke="#D25353" stroke-width="1" opacity="0.7"/>
  <text x="295" y="249" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="10" opacity="0.8">stg.</text>

  <rect x="310" y="232" width="70" height="26" rx="4" fill="none" stroke="#D25353" stroke-width="1" opacity="0.7"/>
  <text x="345" y="249" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="10" opacity="0.8">cdn.</text>

  <!-- Count -->
  <text x="200" y="290" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13" opacity="0.9">[ 47 subdomains found ]</text>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">Subfinder</text>
  <text x="200" y="355" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13" letter-spacing="2">SUBDOMAIN ENUM</text>
</svg>
