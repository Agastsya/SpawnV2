<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#D25353" stroke-width="2"/>

  <!-- Code brackets -->
  <text x="52" y="220" fill="#FFEAD3" font-family="monospace" font-size="110" font-weight="bold" opacity="0.15">&lt;</text>
  <text x="258" y="220" fill="#FFEAD3" font-family="monospace" font-size="110" font-weight="bold" opacity="0.15">&gt;</text>

  <!-- XSS payload lines -->
  <rect x="80" y="110" width="240" height="150" rx="6" fill="none" stroke="#D25353" stroke-width="1.5" opacity="0.5"/>

  <text x="95" y="138" fill="#D25353" font-family="monospace" font-size="13">&lt;script&gt;</text>
  <text x="95" y="158" fill="#FFEAD3" font-family="monospace" font-size="13" opacity="0.7">  alert(<tspan fill="#D25353">'XSS'</tspan>)</text>
  <text x="95" y="178" fill="#D25353" font-family="monospace" font-size="13">&lt;/script&gt;</text>

  <!-- Divider -->
  <line x1="80" y1="190" x2="320" y2="190" stroke="#D25353" stroke-width="1" opacity="0.4"/>

  <text x="95" y="210" fill="#D25353" font-family="monospace" font-size="11" opacity="0.8">[ PAYLOAD INJECTED ]</text>
  <text x="95" y="228" fill="#FFEAD3" font-family="monospace" font-size="11" opacity="0.6">SEVERITY: HIGH</text>
  <text x="95" y="246" fill="#D25353" font-family="monospace" font-size="11" opacity="0.6">PARAM: ?q=</text>

  <!-- Warning triangle -->
  <polygon points="340,80 370,130 310,130" fill="none" stroke="#D25353" stroke-width="2"/>
  <text x="340" y="122" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="22" font-weight="bold">!</text>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" fill="#FFEAD3" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">Dalfox</text>
  <text x="200" y="355" text-anchor="middle" fill="#D25353" font-family="monospace" font-size="13" letter-spacing="2">XSS SCANNER</text>
</svg>
